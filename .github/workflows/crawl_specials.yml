name: 爬取专业数据

run-name: >-
  专业数据
  #${{ github.run_number }}

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 1 * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: crawl-specials-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建数据目录
        run: |
          mkdir -p data/specials
          mkdir -p data/specials_progress

      - name: 检查学校数据
        shell: bash
        run: |
          set -euo pipefail
          test -f data/schools.json || (echo "缺少 data/schools.json，请先更新学校数据" && exit 1)
          echo "检测到学校索引文件: data/schools.json"

      - name: 执行当前批次
        id: specials_run
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail

          export SPECIAL_PROGRESS_FILE="data/specials_progress/progress.json"
          export SPECIAL_PROGRESS_DIR="data/specials_progress"
          export SPECIAL_DATA_DIR="data/specials"
          export SPECIAL_RUN_DEADLINE_SECONDS=17400
          export SPECIAL_FLUSH_SCHOOLS=25
          export SCHOOL_DATA_FILE="data/schools.json"

          python scripts/run_specials_once.py             --github-output "$GITHUB_OUTPUT"

      - name: 提交结果
        id: commit_changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A data/specials data/specials_progress

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "本轮没有文件变化"
            exit 0
          fi

          git commit -m "🎓 专业数据 #${{ github.run_number }}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: 调度下一次运行
        if: steps.specials_run.outputs.run_status == 'partial' || steps.specials_run.outputs.run_status == 'paused'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          API_ROOT="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          WORKFLOW_FILE=".github/workflows/crawl_specials.yml"

          WORKFLOW_ID="$({
            curl -sS               -H 'Accept: application/vnd.github+json'               -H "Authorization: Bearer ${GITHUB_TOKEN}"               -H 'X-GitHub-Api-Version: 2022-11-28'               "${API_ROOT}/actions/workflows"             | jq -r --arg wf "$WORKFLOW_FILE" '.workflows[] | select(.path == $wf or (.path | endswith("/" + $wf)) or .name == $wf) | .id'             | head -n 1
          })"

          if [ -z "${WORKFLOW_ID:-}" ] || [ "$WORKFLOW_ID" = "null" ]; then
            echo "未找到目标 workflow: ${WORKFLOW_FILE}"
            exit 1
          fi

          PAYLOAD="$({
            jq -nc --arg ref "${GITHUB_REF_NAME}" '{ref: $ref}'
          })"

          HTTP_CODE="$({
            curl -sS               -o /tmp/dispatch_response.txt               -w '%{http_code}'               -X POST               -H 'Accept: application/vnd.github+json'               -H "Authorization: Bearer ${GITHUB_TOKEN}"               -H 'X-GitHub-Api-Version: 2022-11-28'               "${API_ROOT}/actions/workflows/${WORKFLOW_ID}/dispatches"               -d "$PAYLOAD"
          })"

          if [ "$HTTP_CODE" != "204" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "调度失败，HTTP ${HTTP_CODE}"
            cat /tmp/dispatch_response.txt
            exit 1
          fi

          echo "已调度下一次专业数据运行"
